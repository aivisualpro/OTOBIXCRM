<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Yellow arc (top-left) -->
  <path d="M256 40 C160 40, 80 100, 55 190" stroke="#F5C518" stroke-width="45" fill="none" stroke-linecap="round"/>
  <!-- Red arc (top-right) -->
  <path d="M55 190 C55 190, 460 40, 460 200" stroke="#E31E24" stroke-width="45" fill="none" stroke-linecap="round"/>
  <path d="M380 55 C440 90, 470 145, 470 200" stroke="#E31E24" stroke-width="45" fill="none" stroke-linecap="round"/>
  <!-- Green arc (bottom) -->
  <path d="M470 260 C470 380, 370 460, 256 460 C150 460, 55 380, 55 260" stroke="#2E8B57" stroke-width="45" fill="none" stroke-linecap="round"/>
  <!-- Car body silhouette -->
  <g transform="translate(256, 230)">
    <!-- Car body -->
    <path d="M-120,20 L-100,-30 L-60,-70 L60,-70 L100,-30 L120,20 L120,45 L-120,45 Z" fill="#1a1a1a"/>
    <!-- Windshield -->
    <path d="M-55,-60 L-30,-25 L-80,-25 Z" fill="white" opacity="0.9"/>
    <path d="M55,-60 L30,-25 L80,-25 Z" fill="white" opacity="0.9"/>
    <!-- Wheels -->
    <circle cx="-75" cy="50" r="22" fill="#1a1a1a"/>
    <circle cx="75" cy="50" r="22" fill="#1a1a1a"/>
    <circle cx="-75" cy="50" r="10" fill="#555"/>
    <circle cx="75" cy="50" r="10" fill="#555"/>
  </g>
  <!-- Green hand -->
  <g transform="translate(256, 350)">
    <path d="M-80,0 C-60,40, 0,60, 80,20 C60,50, -20,70, -80,30 Z" fill="#2E8B57"/>
    <path d="M80,20 C100,10, 110,0, 100,-10 C90,0, 80,10, 60,20 Z" fill="#2E8B57"/>
  </g>
</svg>
